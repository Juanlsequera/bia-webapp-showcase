# mongo-backup.yml — Backup diario de MongoDB Atlas (M0 no incluye backup nativo)
#
# Estrategia: `mongodump` → archivo .gz → artifact de GitHub Actions con
# retención 90 días. Sin costo: el free tier de Actions cubre esto holgadamente
# (M0 limita a 512MB, el dump comprimido pesa decenas de MB).
#
# Restore: bajar el artifact desde GitHub → Actions → mongo-backup-* →
# `mongorestore --uri="<URI>" --archive=backup.gz --gzip --drop`
# Ver docs/12-checklist-prod.md § Backups para el procedimiento completo.
#
# Si migrás a M2+ (que incluye backups automáticos diarios), podés borrar
# este archivo o dejarlo como segunda capa de defensa.
#
# Requiere secret en GitHub: MONGODB_URI (mismo string que usa Render).

