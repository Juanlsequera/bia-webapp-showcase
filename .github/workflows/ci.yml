name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  # ── Unit tests + lint ──────────────────────────────────────────────────────
  unit:
    name: Typecheck, Lint & Unit Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: root
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@bia/types lint
      - run: pnpm turbo lint
      - run: pnpm turbo test
        env:
          MONGODB_URI: mongodb://root:root@localhost:27017/bia_test?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # ── Backend E2E (NestJS supertest) ────────────────────────────────────────
  backend-e2e:
    name: Backend E2E (supertest)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: root
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=api test:e2e
        env:
          MONGODB_URI: mongodb://root:root@localhost:27017/bia_e2e?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-e2e-backend
          SUPERADMIN_EMAIL: sa@bia.dev
          SUPERADMIN_PASSWORD: sa-pw-bootstrap
          NODE_ENV: test

