# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — Deploy manual a Producción
#
# ¿QUÉ HACE ESTE ARCHIVO?
# =======================
# Este workflow despliega la aplicación a producción.
# NO se dispara automáticamente — requiere que vayas a GitHub y presiones
# un botón. Esto es intencional: en producción, vos decidís cuándo desplegar.
#
# ¿CUÁNDO USAR?
# =============
# 1. Tenés cambios listos en la rama `main` (mergeaste develop → main)
# 2. Vas a GitHub → Actions → "Deploy a Producción" → "Run workflow"
# 3. Seleccionás la rama `main` en el dropdown
# 4. Click "Run workflow"
#
# GitHub corre los tests, y si pasan, despliega a los tres destinos en paralelo:
#   - API → Render (via deploy hook)
#   - Web (clientes + admin) → Vercel
#   - Superadmin → Vercel
#
# ¿POR QUÉ MANUAL?
# ================
# Con push automático a main, cualquier commit (incluso un typo en un README)
# dispararía un deploy completo. El deploy manual te da control:
#   - Podés revisar el diff antes de deployar
#   - Podés esperar a tener varios cambios acumulados
#   - Podés deployar en horario de bajo tráfico
#
# FLUJO COMPLETO:
# ==============
#   develop (trabajo diario)
#     └→ PR a main (code review)
#         └→ Merge a main
#             └→ [manualmente] GitHub → Actions → Run workflow → main
#                  └→ guard (¿estamos en main?)
#                      └→ ci-gate (tests)
#                          ├→ deploy-api (Render)
#                          ├→ deploy-web (Vercel)
#                          └→ deploy-superadmin (Vercel)
#
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy a Producción

on:
  # ── SOLO MANUAL — sin push automático ────────────────────────────────────
  # En GitHub UI: Actions → "Deploy a Producción" → Run workflow → elegí main
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 0: GUARD — Verificar que estamos en la rama main
  # ───────────────────────────────────────────────────────────────────────────
  # workflow_dispatch permite elegir cualquier rama. Este job falla si alguien
  # accidentalmente ejecuta el deploy desde develop u otra rama.
  # Es un seguro extra: producción solo desde main.
  # ═══════════════════════════════════════════════════════════════════════════
  guard:
    name: Verificar rama main
    runs-on: ubuntu-latest
    steps:
      - name: Fallar si no es main
        if: github.ref_name != 'main'
        run: |
          echo "❌ Este workflow solo puede ejecutarse desde la rama 'main'."
          echo "   Rama actual: ${{ github.ref_name }}"
          echo ""
          echo "   Pasos correctos:"
          echo "   1. Mergear develop → main en GitHub"
          echo "   2. Volver a Actions → Deploy a Producción → Run workflow → main"
          exit 1
      - name: Confirmación
        run: |
          echo "✅ Rama verificada: main (${{ github.sha }})"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: CI-GATE — Tests antes de deployar
  # ───────────────────────────────────────────────────────────────────────────
  # Corre typecheck, lint y tests COMPLETOS antes de tocar producción.
  # Si algo falla aquí, los deploys de abajo NO se ejecutan.
  # Nunca llega código roto a producción.
  # ═══════════════════════════════════════════════════════════════════════════
  ci-gate:
    name: Tests (gate previo al deploy)
    runs-on: ubuntu-latest
    needs: guard   # ← solo si la verificación de rama pasó

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: root
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint
      - run: pnpm turbo test
        env:
          MONGODB_URI: mongodb://root:root@localhost:27017/bia_test?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: DEPLOY API → Render
  # ───────────────────────────────────────────────────────────────────────────
  # Render ofrece "Deploy Hooks": una URL secreta que al llamarla por POST
  # le dice a Render "hay código nuevo, rebuildeá y desplegá".
  # Render se encarga de hacer git pull, instalar deps, compilar y reiniciar.
  # El secret RENDER_DEPLOY_HOOK_URL se guarda en GitHub → Settings → Secrets.
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-api:
    name: API → Render
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy hook de Render
        run: |
          echo "🚀 Disparando deploy en Render..."
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render comenzó el deploy (se verifica en el dashboard de Render)"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: DEPLOY WEB → Vercel
  # ───────────────────────────────────────────────────────────────────────────
  # Vercel CLI recibe el código, lo buildea en sus servidores y lo despliega.
  # --prod activa el alias de producción (el dominio principal).
  # Sin --prod se crearía solo un preview URL (staging).
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-web:
    name: Web (clientes + admin) → Vercel
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy a Vercel (producción)
        run: pnpm dlx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: DEPLOY SUPERADMIN → Vercel
  # ───────────────────────────────────────────────────────────────────────────
  # Igual que el web, pero para el panel de superadmin (proyecto Vercel separado).
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-superadmin:
    name: Superadmin → Vercel
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy a Vercel (producción)
        run: pnpm dlx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/superadmin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SUPERADMIN }}
